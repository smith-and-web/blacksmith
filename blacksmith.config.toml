# blacksmith runtime config — parsed by blacksmith/config.py (BlacksmithConfig).
#
# This is blacksmith's OWN config. Do NOT confuse it with the per-target-repo
# `blacksmith.toml` (toolchain test_cmd / lint_cmd), which lives in each TARGET
# repo and is read by the test gate (PRD §12 decision 4).

[target]
# Absolute path to the repository blacksmith operates on. Optional: when omitted (or
# commented out), the target resolves to the git root of the current working directory
# (WU-INSTALL) — so running blacksmith from inside a repo targets that repo.
# repo_path = "/absolute/path/to/target-repo"
default_branch = "main"

[models]
# Per-node model tiering (PRD §8). Current model IDs only — no date suffixes.
plan = "claude-sonnet-4-6"     # cheaper/faster: planning + triage
implement = "claude-sonnet-5"  # implementation
triage = "claude-haiku-4-5"

[limits]
# Gate self-heal loop (WU-GATE-SELF-HEAL). When a unit's test gate fails, blacksmith
# re-implements the unit with the gate output fed back, instead of discarding the
# (expensive) run on a fixable error.
#
# max_fix_attempts: same-model retries WITH the gate error fed back, tried BEFORE the
#   single stronger-model escalation. 0 disables the loop (escalate-then-halt). The
#   bounded count is the anti-runaway guard: worst case per unit is
#   1 + max_fix_attempts + 1 implement attempts.
max_fix_attempts = 1
# max_run_cost_usd: OPTIONAL hard ceiling on total run spend. Once the run crosses it, no
#   further retry/escalation fires and it halts with a "cost cap reached" error. Commented
#   out = no cap. A hard whole-run cap can strand an already-committed multi-unit run, so
#   pick a value with that in mind (a single-PRD run today costs ~$5-7.50).
# max_run_cost_usd = 12.0
#
# max_implement_turns: the per-attempt turn budget for the implementer (default 40). A large
#   unit needs more turns; too small a budget makes implement hit the cap and fail before
#   finishing. Bump it for turn-heavy PRDs (or split the unit smaller).
# max_implement_turns = 40
# max_implement_continuations: how many times a turn-capped implement attempt may CONTINUE —
#   keeping its partial work, fresh budget — before halting (code default 1). A turn cap is a
#   budget-shaped failure, not a broken one, so the partial work is finished rather than
#   discarded. 0 disables it (a turn cap halts immediately). Sequential path only. Set to 2
#   here: turn-heavy units (e.g. a new module + config + cli wiring + tests) can need more
#   than one continuation to finish.
max_implement_continuations = 2

[checkpointer]
# SQLite checkpointer DB (PRD §12 decision 1). Relative to blacksmith's CWD.
db_path = ".blacksmith/checkpoints.sqlite"

[api]
# blacksmith reads its dedicated Anthropic API key from this env var
# (PRD §8 / §12 decision 3). The key itself lives in .env, never here.
key_env_var = "BLACKSMITH_ANTHROPIC_API_KEY"
prompt_caching = true

[index]
# Repo-map + search_code index (WU-INDEX-* / WU-PLAN-*). When enabled, the plan and implement
# tiers get a compact repo map in their (cached) system prompt plus a search_code tool, so the
# agent stops re-discovering the codebase with dozens of Read/Grep/Glob calls every node.
# Turned ON here to measure the read/turn reduction vs the ~116-turn-plan baseline.
enabled = true
# max_map_bytes = 12000   # size ceiling for the injected map (default 12000)
# exclude = []            # extra path globs to omit, on top of git ls-files
