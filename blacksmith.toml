# Toolchain for the test gate when blacksmith is the TARGET repo (self-dogfood,
# PRD §5 / §11). Read by blacksmith/gate.py. This is DISTINCT from
# blacksmith.config.toml, which is blacksmith's own runtime config.
#
# uv-prefixed so the commands resolve the project environment from a fresh worktree
# checkout (the PRD's bare "pytest" / "ruff check" assume an already-active venv).
test_cmd = "uv run pytest"
lint_cmd = "uv run ruff check"
# Auto-fix the auto-fixable lint violations (unused imports, etc.) before the gate, so a
# generated unit isn't halted/escalated over a nit ruff can fix itself. Any change is folded
# into the unit's commit. Pairs with lint_cmd above; `ruff check --fix` applies only safe fixes.
fix_cmd = "uv run ruff check --fix"
